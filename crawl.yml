name: 台风快讯定时爬取

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 运行爬虫
        run: python crawler.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/typhoon_latest.json
          if git diff --cached --quiet; then
            echo "NO_CHANGE=true" >> $GITHUB_ENV
          else
            echo "NO_CHANGE=false" >> $GITHUB_ENV
            git commit -m "自动更新台风快讯 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: 触发 Pages 重新部署
        if: success()
        run: |
          gh api repos/${{ github.repository }}/pages/builds --method POST

